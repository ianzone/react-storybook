name: Release
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: bun i --frozen-lockfile --ignore-scripts
      - run: bun run build
      - run: bunx --package semantic-release --package @semantic-release/exec semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      has_docs_changes: ${{ steps.semantic.outputs.has_docs_changes }}

  storybook:
    needs: release
    if: needs.release.outputs.new_release_published == 'true' || needs.release.outputs.has_docs_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: bun i --frozen-lockfile --ignore-scripts &&  bun run build:story
      - uses: chromaui/action@latest
        with:
          storybookBuildDir: storybook
          projectToken: ${{ secrets.CHROMATIC_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
